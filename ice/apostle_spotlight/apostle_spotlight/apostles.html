<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background-color: tan;
        }
        #box {
            border: solid #004e63 4px;
            width: 1200px;
            border-radius: 20px;
            margin: 0 auto;
            text-align: center;
            background-image: url("images/christus.webp");
        }
        .spotlight {
            border: white;
            border-style: solid;
            width: 100px;
            height: 100px;
            margin: 0 auto;
            border-radius: 100px;
            overflow: hidden;
        }
        .spotlight img {
            width: 100px;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
    <div id="box">
        <h1>First Presidency</h1>
        <div class="spotlight">
        <img src="images/oaks.webp" alt="Presidency Oaks">
        </div>
        <h2>Quorum of the twelve apostles</h2>
        <div class="spotlight">
        <img src="images/uchtdorf.webp" alt="Elder Uchtdorf">
        </div>
        <div class="spotlight">
        <img src="images/bednar.webp" alt="Elder Bednar">
        </div>
    </div>
</body>
</html>
